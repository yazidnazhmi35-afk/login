<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selamat Datang | Portal Premium</title>
    <link rel="stylesheet" href="style.css">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="glass-card text-center">
        <div class="mb-4">
            <div style="background: var(--primary); width: 64px; height: 64px; border-radius: 16px; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem;">
                <i data-lucide="shield-check" style="width: 32px; height: 32px; color: white;"></i>
            </div>
            <h1 class="text-gradient">Selamat Datang</h1>
            <p style="color: var(--text-muted);">Silakan masuk atau daftar untuk melanjutkan akses ke dashboard Anda.</p>
        </div>

        <div style="margin-top: 2.5rem;">
            <a href="login.html" class="btn-premium btn-primary-premium">
                <i data-lucide="log-in" style="width: 20px;"></i>
                Masuk ke Akun
            </a>
            
            <a href="signup.html" class="btn-premium btn-outline-premium">
                <i data-lucide="user-plus" style="width: 20px;"></i>
                Daftar Akun Baru
            </a>
        </div>

        <p class="footer-text">
            © 2024 Pemrograman Web 2. All rights reserved.
        </p>
    </div>

    <script src="auth.js"></script>
    <script>
        lucide.createIcons();

        // Check if already logged in
        const session = Auth.getSession();
        if (session) {
            const container = document.querySelector('.glass-card div:last-of-type');
            container.innerHTML = `
                <a href="dashboard.html" class="btn-premium btn-primary-premium">
                    <i data-lucide="layout-dashboard" style="width: 20px;"></i>
                    Buka Dashboard
                </a>
                <button onclick="Auth.logout()" class="btn-premium btn-outline-premium" style="cursor: pointer;">
                    <i data-lucide="log-out" style="width: 20px;"></i>
                    Logout
                </button>
            `;
            lucide.createIcons();
        }
    </script>
</body>
</html>
